services:
  website-api:
    image: ghcr.io/sol-armada/website:latest
    container_name: website-api
    env_file:
      - ./api/.env.production
    ports:
      - "8080:8080"
    depends_on:
      - redis
    deploy:
      mode: replicated
      replicas: 1

  redis:
    image: redis:7-alpine
    container_name: website-redis
    ports:
      - "6379:6379"

networks:
  default:
    name: website-network
